<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星夜空</title>

<style>

/* 🌸 字體 */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf") format("truetype");
}

/* 🌌 基礎 */
body{
    margin:0;
    background:#0b0b14;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"DongZhu","Noto Serif TC",serif;
    color:white;
}

/* 🌌 星空 */
.layer-back,.layer-mid,.layer-front,.scanline,.hud{
    pointer-events:none;
}

.layer-back{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.25)1px,transparent 2px);
    animation: drift 40s linear infinite;
    opacity:.5;
}

.layer-mid{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 60% 50%,rgba(255,230,180,.4)1.5px,transparent 3px);
    animation: drift 25s linear infinite;
    opacity:.6;
}

.layer-front{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 30% 80%,rgba(255,255,255,.8)2px,transparent 3px);
    animation: drift 12s linear infinite;
    opacity:.8;
}

@keyframes drift{
    from{transform:translateY(0);}
    to{transform:translateY(-120px);}
}

/* 🌌 HUD */
.hud{
    position:fixed;
    inset:0;
    border:1px solid rgba(255,230,150,.15);
}

/* 🌌 掃描線 */
.scanline{
    position:fixed;
    inset:0;
    background:linear-gradient(to bottom,transparent,rgba(255,230,150,.05),transparent);
    animation:scan 5s linear infinite;
}

@keyframes scan{
    from{transform:translateY(-100%);}
    to{transform:translateY(100%);}
}

/* 🌌 場景（真正置中） */
.scene{
    position:absolute;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:0 20px;
    box-sizing:border-box;

    transform:scale(1.03);
    filter:blur(6px);
    transition:opacity .8s ease, transform .8s ease, filter .8s ease;
}

/* 只保留唯一 active 規則 */
.scene.active{
    display:flex;
    opacity:1;
    transform:scale(1);
    filter:blur(0);
    z-index:10;
}

/* 🌌 文字 */
h1, h2{
    margin:0;
    white-space:nowrap;
    font-weight:normal;
    text-shadow:0 0 10px #fff3c4,0 0 25px #ffd77a;
}

h1{
    font-size:clamp(32px,6vw,72px);
    line-height:1.4;
}

h2{
    font-size:clamp(22px,4.5vw,42px);
    line-height:1.4;
}

/* 🌌 打字 */
.typing{
    display:inline-block;
    overflow:hidden;
    width:0;
    border-right:2px solid white;
    animation:typing 2.4s steps(30,end) forwards, blink .8s infinite;
}

@keyframes typing{
    from{width:0;}
    to{width:100%;}
}

@keyframes blink{
    50%{border-color:transparent;}
}

/* 🌌 浮現 */
.floatUp{
    opacity:0;
    transform:translateY(40px);
    animation:floatUp 1.6s ease forwards;
}

@keyframes floatUp{
    to{opacity:1;transform:translateY(0);}
}

/* 🌌 手機 */
@media(max-width:768px){
    h1{font-size:clamp(18px,5vw,28px);}
    h2{font-size:clamp(15px,4vw,22px);}
}

/* 🌸 粉色連結 */
a.starlink{
    color:#f7b6d2 !important;
    text-decoration:none !important;
    text-shadow:0 0 8px #f7b6d2,0 0 18px #ff9ecf,0 0 30px #ff7fbf;
}

a.starlink:hover{
    color:#ffd1e6 !important;
}

a.starlink:active{
    color:#ff4fa3 !important;
}

/* 🌸 圖片 */
.scene img{
    width:100vw;
    max-width:100%;
    height:auto;
    display:block;
}

/* 🌸 圖片退場動畫 */
.scene img.fade-out{
    animation:imgOut 1.2s ease forwards;
}

@keyframes imgOut{
    0%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }
    100%{
        opacity:0;
        transform:scale(0.98);
        filter:blur(8px);
    }
}

/* 🌌 浮現 */
.floatUp{
opacity:0;
transform:translateY(40px);
animation:floatUp 1.6s ease forwards;
}

@keyframes floatUp{
to{opacity:1;transform:translateY(0);}
}

/* 🌌 手機 */
@media(max-width:768px){
h1{font-size:clamp(18px,5vw,28px);}
h2{font-size:clamp(15px,4vw,22px);}
}

/* 🌸 粉色連結（點我進入） */
a.starlink{
color:#f7b6d2 !important;
text-decoration:none !important;
text-shadow:0 0 8px #f7b6d2,0 0 18px #ff9ecf,0 0 30px #ff7fbf;
}

a.starlink:hover{
color:#ffd1e6 !important;
}

a.starlink:active{
color:#ff4fa3 !important;
}

/* 🌸 圖片回憶進出場 */
.scene img{
width:100vw;
max-width:100%;
height:auto;
display:block;

}

/* 進場 */
.scene.active img{
animation:imgIn 1.6s ease forwards;
}

/* 離場 */
.scene img.fade-out{
animation:imgOut 1.2s ease forwards;
}

@keyframes imgIn{
0%{
opacity:0;
transform:scale(1.06);
filter:blur(10px);
}
60%{
opacity:1;
filter:blur(3px);
}
100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
}

@keyframes imgOut{
0%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
100%{
opacity:0;
transform:scale(0.98);
filter:blur(8px);
}
}
</style>

</head> 

<body onclick="startMusic(); nextScene()">

<!-- 🌌 星層 -->
<div class="layer-back"></div>
<div class="layer-mid"></div>
<div class="layer-front"></div>
<div class="scanline"></div>
<div class="hud"></div>

<!-- 🌌 劇情（全部完整保留） -->

<audio id="bgm" src="./time-to-love.mp3" loop></audio>
<!-- 第一幕 -->
<div class="scene active">
    <div>
        <h1 class="typing">嗨！我是巧虎</h1>
    </div>
</div>

<!-- 第二幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
        還記得嗎？<br>
        小時候的我們，總會在電視前等著我出現。
        </h2>
    </div>
</div>

<!-- 第三幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
        那時候的煩惱很小很小。<br>
        只要有人陪著，就會很開心。
        </h2>
    </div>
</div>

<!-- 第四幕 -->
<div class="scene">
    <img src="./01.png">
</div>

<!-- 第五幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
        原來不知不覺，<br>
        我們已經長大了呀。
        </h2>
    </div>
</div>

<!-- 第六幕 -->
<div class="scene">
    <div>
        <h1 class="typing">
        但我還是會一直陪著你。
        </h1>
    </div>
</div>

<script>

const bgm = document.getElementById("bgm");

function startMusic(){
    if(bgm.paused){
        bgm.volume = 0;
        bgm.play();

        let v = 0;
        let fadeIn = setInterval(() => {
            v += 0.05;
            bgm.volume = v;
            if(v >= 1) clearInterval(fadeIn);
        }, 100);
    }
}

function fadeOutMusic(){
    let v = bgm.volume;

    let timer = setInterval(() => {
        v -= 0.05;
        bgm.volume = v;

        if(v <= 0){
            bgm.pause();
            clearInterval(timer);
        }
    }, 100);
}

document.addEventListener("DOMContentLoaded", () => {

    let index = 0;

    window.nextScene = function(){

        const scenes = document.querySelectorAll(".scene");
        const currentScene = scenes[index];

        if(!currentScene) return;

        const img = currentScene.querySelector("img");

        // 🌸 如果有圖片 → 先退場動畫
        if(img){
            img.classList.add("fade-out");

            setTimeout(() => {
                currentScene.classList.remove("active");
                index++;

                if(index === scenes.length - 1){
                    fadeOutMusic();
                }

                if(index < scenes.length){
                    scenes[index].classList.add("active");
                }
            }, 1200);

            return;
        }

        // 🌸 沒圖片直接切場景
        currentScene.classList.remove("active");
        index++;

        if(index === scenes.length - 1){
            fadeOutMusic();
        }

        if(index < scenes.length){
            scenes[index].classList.add("active");
        }
    };

});

bgm.addEventListener("error", () => {
    console.log("❌ 音檔載入失敗");
});

bgm.addEventListener("canplaythrough", () => {
    console.log("✔ 音檔已成功載入");
});

</script>

</body>
</html>
