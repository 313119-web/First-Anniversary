<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巧虎的星夜回憶</title>

<style>

/* 🌸 字體 */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf") format("truetype");
}

/* 🌌 基礎（改成白底） */
body{
    margin:0;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#ffffff;

    font-family:"DongZhu","Noto Serif TC",serif;
    color:#2a2a2a;
}

/* 🌌 星空層全部隱藏（保留結構但不影響畫面） */
.layer-back,.layer-mid,.layer-front,.scanline,.hud{
    display:none;
}

/* 🌌 場景 */
.scene{
    position:absolute;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:30px;
    box-sizing:border-box;

    opacity:0;
    transform:scale(1.03);

    transition:all .8s ease;
}

.scene.active{
    display:flex;
    opacity:1;
    transform:scale(1);
}

/* 🌸 文字（淡藍＋淡紅＋柔陰影） */
h1,h2{
    margin:0;
    font-weight:normal;

    line-height:1.8;
    white-space:normal;

    max-width:900px;

    /* 🌸 淡藍紅混合字色 */
    color:transparent;
    background:linear-gradient(90deg,#6fa8ff,#ff8fb1);
    -webkit-background-clip:text;
    background-clip:text;

    /* 🌸 柔和陰影 */
    text-shadow:
    0 2px 10px rgba(0,0,0,.18),
    0 0 14px rgba(111,168,255,.25),
    0 0 14px rgba(255,143,177,.18);
} 
h1{
    font-size:clamp(32px,6vw,72px);
    color:#ff7aa2; /* 標題偏粉紅 */
}

h2{
    font-size:clamp(20px,4vw,40px);
}

/* 🌸 打字（改簡化，不會吃字） */
.typing{
    display:inline-block;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
        filter:blur(6px);
    }
    to{
        opacity:1;
        transform:translateY(0);
        filter:blur(0);
    }
}

/* 🌸 浮現 */
.floatUp{
    opacity:0;
    transform:translateY(40px);
    animation:floatUp 1.6s ease forwards;
}

@keyframes floatUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 🌸 圖片 */
.scene img{
    width:min(78vw,520px);
    max-width:100%;
    border-radius:18px;

    box-shadow:
    0 8px 25px rgba(0,0,0,.15),
    0 0 25px rgba(255,120,160,.12);
}

/* 🌸 圖片動畫 */
.scene.active img{
    animation:imgIn 1.5s ease forwards;
}

@keyframes imgIn{
    from{
        opacity:0;
        transform:scale(1.05);
        filter:blur(8px);
    }
    to{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }
}

.scene img.fade-out{
    animation:imgOut 1s ease forwards;
}

@keyframes imgOut{
    from{
        opacity:1;
        transform:scale(1);
    }
    to{
        opacity:0;
        transform:scale(.95);
    }
}

/* 🌸 連結 */
a.starlink{
    color:#ff7aa2;
    text-decoration:none;
    text-shadow:0 2px 10px rgba(255,120,160,.25);
}

/* 🌸 按鈕 */
#nextBtn{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    font-size:14px;
    letter-spacing:3px;

    color:#4a78c2;

    cursor:pointer;

    opacity:.8;
}

#nextBtn:hover{
    opacity:1;
}

/* 🌸 手機 */
@media(max-width:768px){

    h1{
        font-size:clamp(24px,7vw,36px);
    }

    h2{
        font-size:clamp(16px,4.8vw,24px);
    }

    .scene img{
        width:88vw;
    }

}

</style>
</head>

<body onclick="startMusic()">

<audio id="bgm" src="./time-to-love.mp3" loop></audio>

<!-- 🌸 第一幕 -->
<div class="scene active">
    <h1 class="typing">嗨！我是巧虎 🧸</h1>
</div>

<!-- 🌸 第二幕 -->
<div class="scene">
    <h2 class="floatUp">
        還記得嗎？<br>
        小時候總會坐在電視前等著我出現。
    </h2>
</div>

<!-- 🌸 第三幕 -->
<div class="scene">
    <img src="./qiaohu1.png">
</div>

<!-- 🌸 第四幕 -->
<div class="scene">
    <h2 class="floatUp">
        那時候的世界好小。<br>
        一首歌、一個玩偶、一句鼓勵。
    </h2>
</div>

<!-- 🌸 第五幕 -->
<div class="scene">
    <img src="./qiaohu2.png">
</div>

<!-- 🌸 第六幕 -->
<div class="scene">
    <h2 class="floatUp">
        你曾經學刷牙、學分享、學勇敢。<br>
        也曾經偷偷哭過吧？
    </h2>
</div>

<!-- 🌸 第七幕 -->
<div class="scene">
    <img src="./01.png">
</div>

<!-- 🌸 第八幕 -->
<div class="scene">
    <h2 class="floatUp">
        原來不知不覺，我們已經長大了。
    </h2>
</div>

<!-- 🌸 第九幕 -->
<div class="scene">
    <h1 class="typing">
        但我還是會一直陪著你 ✨
    </h1>
</div>

<!-- 🌸 最後 -->
<div class="scene">
    <h2>
        <a class="starlink" href="https://313119-web.github.io/First-Anniversary/">
            點我回到回憶裡 ✦
        </a>
    </h2>
</div>

<div id="nextBtn">✦ 點擊繼續 ✦</div>

<script>

const bgm = document.getElementById("bgm");

function startMusic(){
    if(bgm.paused){
        bgm.volume = 0;
        bgm.play();

        let v = 0;
        let t = setInterval(()=>{
            v += 0.05;
            bgm.volume = v;
            if(v >= 1) clearInterval(t);
        },100);
    }
}

document.addEventListener("DOMContentLoaded",()=>{

    let index = 0;

    window.nextScene = function(){

        const scenes = document.querySelectorAll(".scene");
        const current = scenes[index];

        if(!current) return;

        const img = current.querySelector("img");

        if(img){
            img.classList.add("fade-out");

            setTimeout(()=>{
                current.classList.remove("active");
                index++;
                if(index < scenes.length){
                    scenes[index].classList.add("active");
                }
            },1000);

            return;
        }

        current.classList.remove("active");
        index++;

        if(index < scenes.length){
            scenes[index].classList.add("active");
        }
    };

});

document.getElementById("nextBtn").onclick = ()=> nextScene();

</script>

</body>
</html>
