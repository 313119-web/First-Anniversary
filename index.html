<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巧虎的回憶</title>

<style>

body{
    margin:0;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#ffffff;

    font-family:"DongZhu","Noto Serif TC",serif;
}

/* 🌸 場景 */
.scene{
    position:absolute;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:30px;
    box-sizing:border-box;

    opacity:0;
    transform:scale(1.03);

    transition:all .8s ease;
}

.scene.active{
    display:flex;
    opacity:1;
    transform:scale(1);
}

/* 🌸 淡藍紅字 */
h1,h2{
    margin:0;
    font-weight:normal;

    line-height:1.8;
    max-width:900px;

    background:linear-gradient(90deg,#6fa8ff,#ff8fb1);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;

    text-shadow:
    0 2px 8px rgba(0,0,0,.15),
    0 0 10px rgba(111,168,255,.15),
    0 0 10px rgba(255,143,177,.12);
}

h1{font-size:clamp(30px,6vw,64px);}
h2{font-size:clamp(18px,4vw,38px);}

/* 🌸 圖片 */
.scene img{
    width:min(80vw,520px);
    border-radius:18px;

    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

/* 🌸 按鈕 */
#nextBtn{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    font-size:14px;
    letter-spacing:3px;

    color:#6fa8ff;
    cursor:pointer;
}

</style>
</head>

<body onclick="startMusic()">

<!-- 🌸 音樂（已改） -->
<audio id="bgm" src="./可愛巧虎島.mp3" loop></audio>

<!-- 🌸 第一幕 -->
<div class="scene active">
    <h1>嗨！我是巧虎 🧸</h1>
</div>

<!-- 🌸 第二幕 -->
<div class="scene">
    <h2>
        還記得嗎？<br>
        小時候的我們都會等我出現。
    </h2>
</div>

<!-- 🌸 第三幕 -->
<div class="scene">
    <img src="./11.png">
</div>

<!-- 🌸 第四幕 -->
<div class="scene">
    <h2>
        那時候的世界很簡單。<br>
        一首歌、一個玩偶、一點陪伴。
    </h2>
</div>

<!-- 🌸 第五幕 -->
<div class="scene">
    <img src="./12.png">
</div>

<!-- 🌸 第六幕 -->
<div class="scene">
    <h2>
        你學會分享、學會勇敢、學會長大。
    </h2>
</div>

<!-- 🌸 第七幕 -->
<div class="scene">
    <h1>
        但我還是會陪著你 ✨
    </h1>
</div>

<!-- 🌸 最後 -->
<div class="scene">
    <h2>
        點一下畫面繼續回憶
    </h2>
</div>

<div id="nextBtn">✦ 點擊繼續 ✦</div>

<script>

const bgm = document.getElementById("bgm");

function startMusic(){
    if(bgm.paused){
        bgm.volume = 0;
        bgm.play();

        let v = 0;
        let t = setInterval(()=>{
            v += 0.05;
            bgm.volume = v;
            if(v >= 1) clearInterval(t);
        },100);
    }
}

let index = 0;

function nextScene(){

    const scenes = document.querySelectorAll(".scene");

    const current = scenes[index];
    if(!current) return;

    current.classList.remove("active");
    index++;

    if(index < scenes.length){
        scenes[index].classList.add("active");
    }
}

document.getElementById("nextBtn").onclick = nextScene;

</script>

</body>
</html>
