<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>竹石體發光文字</title>

<!-- 楊任東竹石體 -->
<link href="https://fonts.googleapis.com/earlyaccess/cwtexyen.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 星空背景 */

.stars{
    position:absolute;
    width:100%;
    height:100%;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation: twinkle 4s infinite;
}

@keyframes twinkle{
    0%,100%{
        opacity:0.1;
    }

    50%{
        opacity:1;
    }
}

/* 主文字 */

.text{
    position:relative;
    z-index:2;

    color:white;

    font-family: "cwTeXYen", sans-serif;

    font-size: clamp(42px, 6vw, 100px);

    letter-spacing:10px;

    text-align:center;

    white-space:nowrap;

    overflow:hidden;

    border-right: 3px solid rgba(255,255,255,0.8);

    width:0;

    text-shadow:
        0 0 8px rgba(255,255,255,0.9),
        0 0 20px rgba(255,255,255,0.8),
        0 0 40px rgba(255,255,255,0.6);

    animation:
        typing 3s steps(12,end) forwards,
        cursor 0.8s infinite;
}

/* 印刷打字效果 */

@keyframes typing{
    from{
        width:0;
    }

    to{
        width:12ch;
    }
}

/* 游標閃爍 */

@keyframes cursor{
    50%{
        border-color:transparent;
    }
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="text">
    原來喜歡是這種感覺
</div>

<script>

/* 星星生成 */

const stars = document.querySelector('.stars');

for(let i=0;i<100;i++){

    const star = document.createElement('div');

    star.classList.add('star');

    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';

    star.style.animationDelay =
        Math.random()*5 + 's';

    star.style.animationDuration =
        (2 + Math.random()*4) + 's';

    stars.appendChild(star);
}

</script>

</body>
</html>
