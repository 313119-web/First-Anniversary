<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>竹石印刷感</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* 星空 */

.stars{
    position:absolute;
    width:100%;
    height:100%;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.3;
    animation: twinkle 4s infinite;
}

@keyframes twinkle{
    50%{
        opacity:1;
    }
}

/* 印刷感文字 */

.text{

    color:white;

    font-size:clamp(48px,7vw,110px);

    letter-spacing:12px;

    font-family:
    "DFKai-SB",
    "KaiTi",
    serif;

    text-shadow:
        0 0 8px rgba(255,255,255,0.8),
        0 0 18px rgba(255,255,255,0.7),
        0 0 35px rgba(255,255,255,0.5);

    opacity:0;

    filter:blur(10px);

    transform:scale(1.05);

    animation: printReveal 2.8s ease forwards;
}

/* 印刷浮現 */

@keyframes printReveal{

    0%{
        opacity:0;
        filter:blur(12px);
        letter-spacing:20px;
    }

    40%{
        opacity:0.4;
    }

    70%{
        filter:blur(2px);
    }

    100%{
        opacity:1;
        filter:blur(0px);
        letter-spacing:12px;
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="text">
    原來喜歡是這種感覺
</div>

<script>

const stars = document.querySelector('.stars');

for(let i=0;i<120;i++){

    const star = document.createElement('div');

    star.classList.add('star');

    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';

    star.style.animationDelay =
        Math.random()*5 + 's';

    stars.appendChild(star);
}

</script>

</body>
</html>
