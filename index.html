<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巧虎的星夜回憶</title>

<style>

/* 🌸 字體 */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf") format("truetype");
}

/* 🌌 基礎 */
body{
    margin:0;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#1f2242,#0b0b14 60%);

    font-family:"DongZhu","Noto Serif TC",serif;
    color:white;
}

/* 🌸 復古粒子 */
body::after{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    radial-gradient(rgba(255,220,160,.15) 1px, transparent 1px);

    background-size:4px 4px;

    opacity:.25;
    pointer-events:none;
    mix-blend-mode:screen;
}

/* 🌌 星空 */
.layer-back,.layer-mid,.layer-front,.scanline,.hud{
    pointer-events:none;
}

.layer-back{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.25)1px,transparent 2px);
    animation:drift 40s linear infinite;
    opacity:.5;
}

.layer-mid{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 60% 50%,rgba(255,230,180,.4)1.5px,transparent 3px);
    animation:drift 25s linear infinite;
    opacity:.6;
}

.layer-front{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 30% 80%,rgba(255,255,255,.8)2px,transparent 3px);
    animation:drift 12s linear infinite;
    opacity:.8;
}

@keyframes drift{
    from{transform:translateY(0);}
    to{transform:translateY(-120px);}
}

/* 🌌 HUD */
.hud{
    position:fixed;
    inset:0;
    border:1px solid rgba(255,230,150,.12);
}

/* 🌌 掃描線 */
.scanline{
    position:fixed;
    inset:0;
    background:
    linear-gradient(
    to bottom,
    transparent,
    rgba(255,230,150,.05),
    transparent);

    animation:scan 5s linear infinite;
}

@keyframes scan{
    from{transform:translateY(-100%);}
    to{transform:translateY(100%);}
}

/* 🌌 場景 */
.scene{
    position:absolute;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:30px;
    box-sizing:border-box;

    opacity:0;
    transform:scale(1.03);
    filter:blur(6px);

    transition:
    opacity .8s ease,
    transform .8s ease,
    filter .8s ease;
}

.scene.active{
    display:flex;
    opacity:1;
    transform:scale(1);
    filter:blur(0);
    z-index:10;
}

/* 🌸 文字 */
h1,h2{
    margin:0;
    font-weight:normal;

    line-height:1.8;
    white-space:normal;

    text-shadow:
    0 0 10px #fff3c4,
    0 0 25px #ffd77a;

    max-width:900px;
}

h1{
    font-size:clamp(32px,6vw,72px);
}

h2{
    font-size:clamp(20px,4vw,40px);
}

/* 🌸 打字動畫 */
.typing{
    display:inline-block;
    overflow:hidden;

    width:0;

    border-right:2px solid white;

    animation:
    typing 2.8s steps(40,end) forwards,
    blink .8s infinite;
}

@keyframes typing{
    from{width:0;}
    to{width:100%;}
}

@keyframes blink{
    50%{border-color:transparent;}
}

/* 🌸 浮現 */
.floatUp{
    opacity:0;
    transform:translateY(40px);
    animation:floatUp 1.8s ease forwards;
}

@keyframes floatUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 🌸 圖片 */
.scene img{
    width:min(78vw,520px);
    max-width:100%;
    border-radius:24px;

    box-shadow:
    0 0 30px rgba(255,220,150,.18),
    0 0 80px rgba(255,190,120,.12);

    animation:imgIn 1.8s ease forwards;
}

/* 🌸 圖片進場 */
@keyframes imgIn{
    0%{
        opacity:0;
        transform:scale(1.06);
        filter:blur(10px);
    }

    60%{
        opacity:1;
        filter:blur(3px);
    }

    100%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }
}

/* 🌸 圖片退場 */
.scene img.fade-out{
    animation:imgOut 1.2s ease forwards;
}

@keyframes imgOut{
    0%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }

    100%{
        opacity:0;
        transform:scale(.98);
        filter:blur(8px);
    }
}

/* 🌸 連結 */
a.starlink{
    color:#f7b6d2;
    text-decoration:none;

    text-shadow:
    0 0 8px #f7b6d2,
    0 0 18px #ff9ecf,
    0 0 30px #ff7fbf;
}

a.starlink:hover{
    color:#ffd1e6;
}

/* 🌸 下一頁按鈕 */
#nextBtn{
    position:fixed;
    bottom:38px;
    left:50%;

    transform:translateX(-50%);

    font-size:14px;
    letter-spacing:3px;

    color:#ffe4a8;

    text-shadow:
    0 0 10px #ffd77a,
    0 0 25px #ffcc70;

    cursor:pointer;
    z-index:999;

    animation:blinkBtn 2s infinite;
}

@keyframes blinkBtn{
    50%{
        opacity:.35;
    }
}

/* 🌸 手機 */
@media(max-width:768px){

    h1{
        font-size:clamp(24px,7vw,36px);
    }

    h2{
        font-size:clamp(16px,4.8vw,24px);
    }

    .scene img{
        width:88vw;
    }

}

</style>
</head>

<body onclick="startMusic()">

<!-- 🌌 星空 -->
<div class="layer-back"></div>
<div class="layer-mid"></div>
<div class="layer-front"></div>
<div class="scanline"></div>
<div class="hud"></div>

<!-- 🌸 音樂 -->
<audio id="bgm" src="./time-to-love.mp3" loop></audio>

<!-- 🌸 第一幕 -->
<div class="scene active">
    <div>
        <h1 class="typing">
            嗨！我是巧虎 🧸
        </h1>
    </div>
</div>

<!-- 🌸 第二幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
            還記得嗎？<br>
            小時候總會坐在電視前等著我出現。
        </h2>
    </div>
</div>

<!-- 🌸 第三幕 -->
<div class="scene">
    <img src="./qiaohu1.png">
</div>

<!-- 🌸 第四幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
            那時候的世界好小。<br><br>

            一首歌、一句鼓勵、<br>
            一個玩偶陪著自己，<br><br>

            就能開心好久好久。
        </h2>
    </div>
</div>

<!-- 🌸 第五幕 -->
<div class="scene">
    <img src="./qiaohu2.png">
</div>

<!-- 🌸 第六幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
            你曾經跟著我學刷牙、學分享、學勇敢。<br><br>

            難過的時候，<br>
            也偷偷哭過吧？
        </h2>
    </div>
</div>

<!-- 🌸 第七幕 -->
<div class="scene">
    <img src="./01.png">
</div>

<!-- 🌸 第八幕 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
            原來不知不覺，<br><br>

            我們已經慢慢長大了呀。
        </h2>
    </div>
</div>

<!-- 🌸 第九幕 -->
<div class="scene">
    <div>
        <h1 class="typing">
            但沒關係。<br><br>

            我還是會一直陪著你 ✨
        </h1>
    </div>
</div>

<!-- 🌸 最後 -->
<div class="scene">
    <div>
        <h2 class="floatUp">
            <a class="starlink"
            href="https://313119-web.github.io/First-Anniversary/">

            點我回到回憶裡 ✦

            </a>
        </h2>
    </div>
</div>

<!-- 🌸 下一頁 -->
<div id="nextBtn">
✦ 點擊繼續 ✦
</div>

<script>

const bgm = document.getElementById("bgm");

function startMusic(){

    if(bgm.paused){

        bgm.volume = 0;

        bgm.play();

        let v = 0;

        let fadeIn = setInterval(() => {

            v += 0.05;

            bgm.volume = v;

            if(v >= 1){
                clearInterval(fadeIn);
            }

        },100);

    }

}

function fadeOutMusic(){

    let v = bgm.volume;

    let timer = setInterval(() => {

        v -= 0.05;

        bgm.volume = v;

        if(v <= 0){

            bgm.pause();

            clearInterval(timer);

        }

    },100);

}

document.addEventListener("DOMContentLoaded",() => {

    let index = 0;

    window.nextScene = function(){

        const scenes =
        document.querySelectorAll(".scene");

        const currentScene =
        scenes[index];

        if(!currentScene) return;

        const img =
        currentScene.querySelector("img");

        /* 🌸 圖片退場 */

        if(img){

            img.classList.add("fade-out");

            setTimeout(() => {

                currentScene.classList.remove("active");

                index++;

                if(index === scenes.length - 1){
                    fadeOutMusic();
                }

                if(index < scenes.length){
                    scenes[index].classList.add("active");
                }

            },1200);

            return;

        }

        /* 🌸 一般場景 */

        currentScene.classList.remove("active");

        index++;

        if(index === scenes.length - 1){
            fadeOutMusic();
        }

        if(index < scenes.length){
            scenes[index].classList.add("active");
        }

    };

});

/* 🌸 按鈕切頁 */

document.getElementById("nextBtn")
.onclick = () => {

    nextScene();

};

/* 🌸 音樂檢查 */

bgm.addEventListener("error",() => {

    console.log("❌ 音檔載入失敗");

});

bgm.addEventListener("canplaythrough",() => {

    console.log("✔ 音檔已成功載入");

});

</script>

</body>
</html>
